<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator - Pro Version</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">GPA Calculator (Step 4)</h2>

        <form id="gpaForm">
            <div class="form-row mb-3">
                <div class="col">
                    <input type="text" name="student_name" class="form-control" placeholder="Student Name" required>
                </div>
                <div class="col">
                    <input type="text" name="semester" class="form-control" placeholder="Semester (e.g. Fall 2026)" required>
                </div>
            </div>

            <div class="progress mb-4" style="height: 30px; display:none;" id="gpaContainer">
                <div id="gpaBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
            </div>

            <div id="courses">
                <div class="form-row mb-2 course-row">
                    <div class="col-6"><input type="text" name="course[]" class="form-control" placeholder="Course Name" required></div>
                    <div class="col-2"><input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" max="20" required></div>
                    <div class="col-3">
                        <select name="grade[]" class="form-control">
                            <option value="4.0">A (4.0)</option>
                            <option value="3.0">B (3.0)</option>
                            <option value="2.0">C (2.0)</option>
                            <option value="1.0">D (1.0)</option>
                            <option value="0.0">F (0.0)</option>
                        </select>
                    </div>
                    <div class="col-1"><button type="button" class="btn btn-danger remove-course">X</button></div>
                </div>
            </div>

            <button type="button" id="addCourse" class="btn btn-secondary mt-2">+ Add Course</button>
            <hr>
            <button type="submit" class="btn btn-primary btn-block">Calculate & Save to DB</button>
            
            <button type="submit" formaction="export.php" formmethod="POST" class="btn btn-success btn-block mt-2">Export to CSV</button>
        </form>

        <div id="result" class="mt-4"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
